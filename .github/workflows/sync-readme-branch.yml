name: Sync README branch link

# Server-side equivalent of the .githooks/pre-commit hook: if a commit
# lands on any branch without the README's "This branch (raw.githack)"
# link pointing at that branch, rewrite it and push the fix back.
# Skip itself by tagging its own commits with [skip readme-sync].

on:
  push:
    branches: ['**']

permissions:
  contents: write

jobs:
  sync:
    if: ${{ !contains(github.event.head_commit.message, '[skip readme-sync]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      - name: Sync README githack link
        run: bash scripts/sync-readme-branch.sh
      - name: Commit + push if changed
        run: |
          if git diff --quiet README.md; then
            echo "README already in sync."
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "README: sync githack link → ${{ github.ref_name }} [skip readme-sync]"
          git push origin HEAD:${{ github.ref_name }}
