name: Sync build timestamp

# Server-side equivalent of the .githooks/pre-commit hook: if a commit
# lands on any branch whose index.html build timestamp is older than
# the push moment, rewrite it and push the fix back. Skip itself by
# tagging its own commits with [skip build-timestamp].

on:
  push:
    branches: ['**']

permissions:
  contents: write

jobs:
  sync:
    if: ${{ !contains(github.event.head_commit.message, '[skip build-timestamp]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      - name: Sync build timestamp
        run: bash scripts/sync-build-timestamp.sh
      - name: Commit + push if changed
        run: |
          if git diff --quiet index.html; then
            echo "index.html already in sync."
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "index.html: sync build timestamp [skip build-timestamp]"
          git push origin HEAD:${{ github.ref_name }}
